<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTK SUCCESS | ผลงาน</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7faff;
      color: #181818;
    }
    .container {
      width: 92%;
      max-width: 1100px;
      margin: auto;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 15px 0;
      text-align: center;
    }
    .nav a {
      margin: 0 8px;
      padding: 8px 14px;
      border-radius: 20px;
      text-decoration: none;
      color: #333;
    }
    .nav a.active {
      background: #2b7af0;
      color: #fff;
    }
    h1 {
      color: #1c52a3;
      margin-top: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }
    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }
    .card-body {
      padding: 15px;
      text-align: center;
    }
    @media(max-width:768px){
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h2>CTK SUCCESS</h2>
    <div class="nav">
      <a href="index.html">หน้าแรก</a>
      <a href="services.html">บริการ</a>
      <a href="portfolio.html" class="active">ผลงาน</a>
      <a href="contact.html">ติดต่อ</a>
    </div>
  </div>

  <div class="container">
    <h1>ผลงานของเรา</h1>
    <p>ตัวอย่างผลงานจริงของทีมงาน</p>

    <div class="grid">
      <div class="card">
        <img src="work1.jpg" alt="work 1">
        <div class="card-body">
          <h3>ผลงานที่ 1</h3>
          <p>งานติดตั้งตู้และระบบควบคุม</p>
        </div>
      </div>

      <div class="card">
        <img src="work2.JPG" alt="work 2">
        <div class="card-body">
          <h3>ผลงานที่ 2</h3>
          <p>งานเชื่อมต่อและจัดการสายภายในระบบ</p>
        </div>
      </div>

      <div class="card">
        <img src="work3.JPG" alt="work 3">
        <div class="card-body">
          <h3>ผลงานที่ 3</h3>
          <p>งานเดินสายและติดตั้งอุปกรณ์หน้างาน</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
